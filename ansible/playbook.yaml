---
- name: Kubernetes — install kubeadm, kubelet, kubectl
  hosts: k8s_node
  become: true

  vars_files:
    - group_vars/all.yaml

  tasks:

    # =========================================================================
    # 1. SYSTEM PREREQUISITES
    # =========================================================================

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600
      tags: system

    - name: Install base dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
          - gnupg2
          - software-properties-common
        state: present
      tags: system

    - name: Disable swap immediately
      command: swapoff -a
      changed_when: false
      tags: system

    - name: Remove swap from /etc/fstab permanently
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'
      tags: system

    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
      tags: system

    - name: Persist kernel modules on boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
      tags: system

    - name: Set sysctl parameters for Kubernetes networking
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward",                 value: "1" }
      tags: system

    # =========================================================================
    # 2. CONTAINER RUNTIME — containerd
    # =========================================================================

    - name: Add Docker GPG key (containerd source)
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      tags: containerd

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
      tags: containerd

    - name: Install containerd
      apt:
        name: containerd.io
        state: present
        update_cache: true
      tags: containerd

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        mode: "0755"
      tags: containerd

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml
      tags: containerd

    - name: Enable SystemdCgroup in containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      tags: containerd

    - name: Enable and restart containerd
      systemd:
        name: containerd
        enabled: true
        state: restarted
        daemon_reload: true
      tags: containerd

    # =========================================================================
    # 3. KUBERNETES PACKAGES — kubeadm, kubelet, kubectl
    # =========================================================================

    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags: kubernetes

    - name: Add Kubernetes GPG key
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key \
          | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      tags: kubernetes

    - name: Add Kubernetes apt repository
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /
      tags: kubernetes

    - name: Install kubeadm, kubelet, kubectl
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true
      tags: kubernetes

    - name: Hold Kubernetes packages at current version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl
      tags: kubernetes

    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: true
      tags: kubernetes
