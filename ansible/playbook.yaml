---
- name: Kubernetes single-node cluster — full infrastructure setup
  hosts: k8s_node
  become: true

  vars_files:
    - group_vars/all.yaml

  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:

    # =========================================================================
    # 1. SYSTEM PREREQUISITES
    # =========================================================================

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600
      tags: system

    - name: Install base dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
          - gnupg2
          - software-properties-common
          - git
          - python3-pip
        state: present
      tags: system

    - name: Install Longhorn prerequisites
      apt:
        name:
          - open-iscsi
          - nfs-common
          - util-linux
          - jq
        state: present
      tags: system, longhorn

    - name: Enable and start iscsid (required by Longhorn)
      systemd:
        name: iscsid
        enabled: true
        state: started
      tags: system, longhorn

    - name: Disable swap immediately
      command: swapoff -a
      changed_when: false
      tags: system

    - name: Remove swap from /etc/fstab permanently
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'
      tags: system

    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
      tags: system

    - name: Persist kernel modules on boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
      tags: system

    - name: Set sysctl parameters for Kubernetes networking
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward",                 value: "1" }
      tags: system

    # =========================================================================
    # 2. CONTAINER RUNTIME — containerd
    # =========================================================================

    - name: Add Docker GPG key (containerd source)
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      tags: containerd

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
      tags: containerd

    - name: Install containerd
      apt:
        name: containerd.io
        state: present
        update_cache: true
      tags: containerd

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        mode: "0755"
      tags: containerd

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml
      tags: containerd

    - name: Enable SystemdCgroup in containerd (required for k8s 1.31)
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      tags: containerd

    - name: Enable and restart containerd
      systemd:
        name: containerd
        enabled: true
        state: restarted
        daemon_reload: true
      tags: containerd

    # =========================================================================
    # 3. KUBERNETES PACKAGES — kubeadm, kubelet, kubectl
    # =========================================================================

    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags: kubernetes

    - name: Add Kubernetes GPG key
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key \
          | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      tags: kubernetes

    - name: Add Kubernetes apt repository
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /
      tags: kubernetes

    - name: Install kubeadm, kubelet, kubectl
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true
      tags: kubernetes

    - name: Hold Kubernetes packages at current version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl
      tags: kubernetes

    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: true
      tags: kubernetes

    # =========================================================================
    # 4. CLUSTER INITIALIZATION
    # =========================================================================

    - name: Check if cluster is already initialized
      stat:
        path: "{{ kubeconfig_path }}"
      register: kubeconfig_stat
      tags: cluster_init

    - name: Initialize cluster with kubeadm
      command: >
        kubeadm init
        --kubernetes-version v{{ k8s_version }}.0
        --pod-network-cidr {{ pod_network_cidr }}
        --ignore-preflight-errors=NumCPU,Mem
      when: not kubeconfig_stat.stat.exists
      tags: cluster_init

    - name: Create .kube directory for root
      file:
        path: /root/.kube
        state: directory
        mode: "0700"
      tags: cluster_init

    - name: Copy kubeconfig to root home
      copy:
        src: "{{ kubeconfig_path }}"
        dest: /root/.kube/config
        remote_src: true
        owner: root
        group: root
        mode: "0600"
      tags: cluster_init

    - name: Export KUBECONFIG in /etc/environment
      lineinfile:
        path: /etc/environment
        line: 'KUBECONFIG={{ kubeconfig_path }}'
        state: present
      tags: cluster_init

    # =========================================================================
    # 5. SINGLE-NODE — remove control-plane taint
    # =========================================================================

    - name: Remove control-plane taint so pods schedule on this node
      command: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
      failed_when: false
      changed_when: false
      tags: cluster_init

    # =========================================================================
    # 6. CNI — Calico
    # =========================================================================

    - name: Wait for API server to be reachable
      command: kubectl cluster-info
      register: api_ready
      until: api_ready.rc == 0
      retries: 20
      delay: 10
      tags: cni

    - name: Apply Calico CNI manifest
      command: kubectl apply -f {{ calico_manifest_url }}
      register: calico_result
      changed_when: "'created' in calico_result.stdout or 'configured' in calico_result.stdout"
      tags: cni

    - name: Wait for Calico node pods to be ready
      command: kubectl wait --for=condition=ready pod -l k8s-app=calico-node -n kube-system --timeout=180s
      tags: cni

    - name: Wait for node to become Ready
      command: kubectl wait node --all --for=condition=Ready --timeout=120s
      tags: cni

    # =========================================================================
    # 7. HELM
    # =========================================================================

    - name: Check if Helm is already installed
      stat:
        path: /usr/local/bin/helm
      register: helm_bin
      tags: helm

    - name: Download and install Helm
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: not helm_bin.stat.exists
      tags: helm

    - name: Install Python kubernetes client (for Ansible k8s tasks)
      pip:
        name: kubernetes
        state: present
      tags: helm

    # =========================================================================
    # 8. TRAEFIK — Ingress Controller
    # =========================================================================

    - name: Add Traefik Helm repo
      command: helm repo add traefik https://traefik.github.io/charts
      changed_when: false
      tags: traefik

    - name: Update Helm repos
      command: helm repo update
      changed_when: false
      tags: traefik

    - name: Install Traefik (NodePort {{ traefik_nodeport_web }}/{{ traefik_nodeport_websecure }})
      command: >
        helm upgrade --install traefik traefik/traefik
        --namespace traefik
        --create-namespace
        --version {{ traefik_chart_version }}
        --set service.type=NodePort
        --set ports.web.nodePort={{ traefik_nodeport_web }}
        --set ports.websecure.nodePort={{ traefik_nodeport_websecure }}
        --wait
      register: traefik_result
      changed_when: "'has been upgraded' in traefik_result.stdout or 'has been deployed' in traefik_result.stdout"
      tags: traefik

    # =========================================================================
    # 9. LONGHORN — Persistent Storage
    # =========================================================================

    - name: Add Longhorn Helm repo
      command: helm repo add longhorn https://charts.longhorn.io
      changed_when: false
      tags: longhorn

    - name: Update Helm repos
      command: helm repo update
      changed_when: false
      tags: longhorn

    - name: Install Longhorn v{{ longhorn_chart_version }}
      command: >
        helm upgrade --install longhorn longhorn/longhorn
        --namespace longhorn-system
        --create-namespace
        --version {{ longhorn_chart_version }}
        --set preUpgradeChecker.jobEnabled=false
        --wait
        --timeout 10m
      register: longhorn_result
      changed_when: "'has been upgraded' in longhorn_result.stdout or 'has been deployed' in longhorn_result.stdout"
      tags: longhorn

    - name: Wait for Longhorn manager pods to be ready
      command: kubectl wait --for=condition=ready pod -l app=longhorn-manager -n longhorn-system --timeout=300s
      tags: longhorn

    # =========================================================================
    # 10. SEALED SECRETS
    # =========================================================================

    - name: Add Sealed Secrets Helm repo
      command: helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
      changed_when: false
      tags: sealed_secrets

    - name: Update Helm repos
      command: helm repo update
      changed_when: false
      tags: sealed_secrets

    - name: Install Sealed Secrets v{{ sealed_secrets_chart_version }}
      command: >
        helm upgrade --install sealed-secrets sealed-secrets/sealed-secrets
        --namespace kube-system
        --version {{ sealed_secrets_chart_version }}
        --set fullnameOverride=sealed-secrets-controller
        --wait
      register: ss_result
      changed_when: "'has been upgraded' in ss_result.stdout or 'has been deployed' in ss_result.stdout"
      tags: sealed_secrets

    - name: Install kubeseal CLI
      shell: |
        LATEST=$(curl -s https://api.github.com/repos/bitnami-labs/sealed-secrets/releases/latest | grep tag_name | cut -d '"' -f4 | tr -d 'v')
        curl -fsSL "https://github.com/bitnami-labs/sealed-secrets/releases/latest/download/kubeseal-${LATEST}-linux-amd64.tar.gz" \
          | tar -xz kubeseal
        install -m 755 kubeseal /usr/local/bin/kubeseal
        rm -f kubeseal
      args:
        creates: /usr/local/bin/kubeseal
      tags: sealed_secrets

    # =========================================================================
    # 11. ARGO ROLLOUTS
    # =========================================================================

    - name: Add Argo Helm repo
      command: helm repo add argo https://argoproj.github.io/argo-helm
      changed_when: false
      tags: argo_rollouts

    - name: Update Helm repos
      command: helm repo update
      changed_when: false
      tags: argo_rollouts

    - name: Install Argo Rollouts v{{ argo_rollouts_chart_version }}
      command: >
        helm upgrade --install argo-rollouts argo/argo-rollouts
        --namespace argo-rollouts
        --create-namespace
        --version {{ argo_rollouts_chart_version }}
        --set dashboard.enabled=true
        --set dashboard.service.type=NodePort
        --set dashboard.service.nodePort={{ argo_rollouts_dashboard_nodeport }}
        --wait
      register: rollouts_result
      changed_when: "'has been upgraded' in rollouts_result.stdout or 'has been deployed' in rollouts_result.stdout"
      tags: argo_rollouts

    - name: Install kubectl argo-rollouts plugin
      shell: |
        curl -fsSL https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64 \
          -o /usr/local/bin/kubectl-argo-rollouts
        chmod +x /usr/local/bin/kubectl-argo-rollouts
      args:
        creates: /usr/local/bin/kubectl-argo-rollouts
      tags: argo_rollouts

    # =========================================================================
    # 12. METACONTROLLER — required by namespace-operator (DecoratorController)
    # =========================================================================

    - name: Create metacontroller namespace
      command: kubectl create namespace metacontroller
      failed_when: false
      changed_when: false
      tags: metacontroller

    - name: Apply Metacontroller RBAC
      command: kubectl apply -f {{ metacontroller_manifest_url }}
      register: mc_rbac
      changed_when: "'created' in mc_rbac.stdout or 'configured' in mc_rbac.stdout"
      tags: metacontroller

    - name: Apply Metacontroller CRDs and StatefulSet
      command: kubectl apply -f {{ metacontroller_crds_url }}
      register: mc_crds
      changed_when: "'created' in mc_crds.stdout or 'configured' in mc_crds.stdout"
      tags: metacontroller

    - name: Wait for Metacontroller to be ready
      command: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=metacontroller -n metacontroller --timeout=120s
      tags: metacontroller

    # =========================================================================
    # 13. MONITORING — kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
    # =========================================================================

    - name: Add Prometheus community Helm repo
      command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      changed_when: false
      tags: monitoring

    - name: Update Helm repos
      command: helm repo update
      changed_when: false
      tags: monitoring

    - name: Install kube-prometheus-stack v{{ kube_prometheus_stack_chart_version }}
      command: >
        helm upgrade --install monitoring prometheus-community/kube-prometheus-stack
        --namespace monitoring
        --create-namespace
        --version {{ kube_prometheus_stack_chart_version }}
        --set prometheus.prometheusSpec.retention=3d
        --set prometheus.prometheusSpec.resources.requests.cpu=50m
        --set prometheus.prometheusSpec.resources.requests.memory=256Mi
        --set prometheus.prometheusSpec.resources.limits.cpu=500m
        --set prometheus.prometheusSpec.resources.limits.memory=1Gi
        --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.storageClassName=longhorn
        --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.accessModes[0]=ReadWriteOnce
        --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage=5Gi
        --set grafana.service.type=NodePort
        --set grafana.service.nodePort={{ grafana_nodeport }}
        --set grafana.adminPassword=admin123
        --set grafana.resources.requests.cpu=50m
        --set grafana.resources.requests.memory=128Mi
        --set grafana.resources.limits.cpu=200m
        --set grafana.resources.limits.memory=256Mi
        --set alertmanager.alertmanagerSpec.resources.requests.cpu=10m
        --set alertmanager.alertmanagerSpec.resources.requests.memory=32Mi
        --set nodeExporter.resources.requests.cpu=10m
        --set nodeExporter.resources.requests.memory=32Mi
        --set prometheusOperator.resources.requests.cpu=10m
        --set prometheusOperator.resources.requests.memory=32Mi
        --set grafana.additionalDataSources[0].name=Loki
        --set grafana.additionalDataSources[0].type=loki
        --set grafana.additionalDataSources[0].url=http://loki.monitoring.svc.cluster.local:3100
        --set grafana.additionalDataSources[0].access=proxy
        --set grafana.additionalDataSources[0].isDefault=false
        --timeout 10m
        --wait
      register: monitoring_result
      changed_when: "'has been upgraded' in monitoring_result.stdout or 'has been deployed' in monitoring_result.stdout"
      tags: monitoring

    # =========================================================================
    # 14. LOGGING — Loki + Promtail
    # =========================================================================

    - name: Add Grafana Helm repo (Loki)
      command: helm repo add grafana https://grafana.github.io/helm-charts
      changed_when: false
      tags: logging

    - name: Update Helm repos
      command: helm repo update
      changed_when: false
      tags: logging

    - name: Install Loki stack v{{ loki_stack_chart_version }}
      command: >
        helm upgrade --install loki grafana/loki-stack
        --namespace monitoring
        --create-namespace
        --version {{ loki_stack_chart_version }}
        --set loki.persistence.enabled=true
        --set loki.persistence.storageClassName=longhorn
        --set loki.persistence.size=5Gi
        --set loki.resources.requests.cpu=50m
        --set loki.resources.requests.memory=128Mi
        --set loki.resources.limits.cpu=200m
        --set loki.resources.limits.memory=256Mi
        --set promtail.resources.requests.cpu=10m
        --set promtail.resources.requests.memory=32Mi
        --set promtail.containerSecurityContext.privileged=true
        --wait
      register: loki_result
      changed_when: "'has been upgraded' in loki_result.stdout or 'has been deployed' in loki_result.stdout"
      tags: logging

    # =========================================================================
    # 15. VERIFY
    # =========================================================================

    - name: Get all nodes
      command: kubectl get nodes -o wide
      register: nodes
      changed_when: false
      tags: verify

    - name: Get all pods across namespaces
      command: kubectl get pods -A
      register: all_pods
      changed_when: false
      tags: verify

    - name: Print cluster summary
      debug:
        msg:
          - "=== NODES ==="
          - "{{ nodes.stdout_lines }}"
          - "=== PODS ==="
          - "{{ all_pods.stdout_lines }}"
          - "=== ACCESS POINTS ==="
          - "Traefik HTTP:       http://<NODE_IP>:{{ traefik_nodeport_web }}"
          - "Traefik HTTPS:      https://<NODE_IP>:{{ traefik_nodeport_websecure }}"
          - "Grafana:            http://<NODE_IP>:{{ grafana_nodeport }}  (admin/admin123)"
          - "Argo Rollouts UI:   http://<NODE_IP>:{{ argo_rollouts_dashboard_nodeport }}"
          - "Longhorn UI:        kubectl port-forward svc/longhorn-frontend 9090:80 -n longhorn-system"
      tags: verify
