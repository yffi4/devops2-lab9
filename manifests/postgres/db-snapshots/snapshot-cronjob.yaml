apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-snapshot
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: snapshot-sa
          containers:
          - name: snapshot
            image: bitnami/kubectl:latest
            command:
            - /bin/sh
            - -c
            - |
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              SNAPSHOT_NAME="postgres-snap-${TIMESTAMP}"

              cat <<SNAP | kubectl apply -f -
              apiVersion: snapshot.storage.k8s.io/v1
              kind: VolumeSnapshot
              metadata:
                name: ${SNAPSHOT_NAME}
                namespace: default
              spec:
                volumeSnapshotClassName: longhorn-snapshot
                source:
                  persistentVolumeClaimName: postgres-storage-postgres-0
              SNAP
              echo "Snapshot ${SNAPSHOT_NAME} created"

              KEEP=5
              OLD=$(kubectl get volumesnapshot -n default \
                --sort-by=.metadata.creationTimestamp \
                -o name | grep "postgres-snap-" | head -n -${KEEP})
              if [ -n "$OLD" ]; then
                echo "$OLD" | xargs kubectl delete -n default
                echo "Cleaned up old snapshots, keeping last ${KEEP}"
              fi
          restartPolicy: OnFailure
