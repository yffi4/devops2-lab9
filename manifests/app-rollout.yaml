apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: oauth-api
  labels:
    app: oauth-api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: oauth-api
  strategy:
    blueGreen:
      activeService: oauth-api-service
      previewService: oauth-api-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
  template:
    metadata:
      labels:
        app: oauth-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: oauth-api
        image: my-oauth-api:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 8140
        env:
        - name: PORT
          value: "8140"
        envFrom:
        - secretRef:
            name: app-secret
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /docs
            port: 8140
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /docs
            port: 8140
          initialDelaySeconds: 10
          periodSeconds: 15
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
