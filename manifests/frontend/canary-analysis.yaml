apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: canary-health-check
spec:
  metrics:
  - name: error-rate
    interval: 30s
    count: 5
    failureLimit: 1
    successCondition: result < 0.05
    provider:
      prometheus:
        address: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
        query: |
          (sum(rate(traefik_router_requests_total{service=~".*oauth-frontend.*",code=~"5.."}[2m])) or on() vector(0))
          /
          (sum(rate(traefik_router_requests_total{service=~".*oauth-frontend.*"}[2m])) or on() vector(1))

  - name: memory-utilization
    interval: 30s
    count: 5
    failureLimit: 1
    successCondition: result < 0.85
    provider:
      prometheus:
        address: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
        query: |
          max(
            container_memory_working_set_bytes{namespace="default",container="frontend"}
            /
            container_spec_memory_limit_bytes{namespace="default",container="frontend"}
          )

  - name: pod-restarts
    interval: 30s
    count: 5
    failureLimit: 0
    successCondition: result == 0
    provider:
      prometheus:
        address: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
        query: |
          (sum(increase(kube_pod_container_status_restarts_total{
            namespace="default",
            container="frontend"
          }[5m])) or on() vector(0))
