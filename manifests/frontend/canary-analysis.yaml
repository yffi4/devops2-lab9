apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: canary-health-check
spec:
  metrics:
  - name: pod-readiness
    initialDelay: 30s
    interval: 15s
    count: 5
    failureLimit: 2
    provider:
      prometheus:
        address: http://monitoring-kube-prometheus-prometheus.monitoring:9090
        query: |
          scalar(
            min(
              kube_pod_status_ready{
                namespace="default",
                pod=~"oauth-frontend.*",
                condition="true"
              }
            ) or vector(1)
          )
    successCondition: "result >= 1"
    failureCondition: "result == 0"
