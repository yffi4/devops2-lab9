apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-api
  labels:
    app: oauth-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: oauth-api
  template:
    metadata:
      labels:
        app: oauth-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: oauth-api
        image: my-oauth-api:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8140
        env:
        - name: PORT
          value: "8140"
        envFrom:
        - secretRef:
            name: app-secret
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /docs
            port: 8140
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /docs
            port: 8140
          initialDelaySeconds: 10
          periodSeconds: 15
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
