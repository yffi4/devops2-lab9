apiVersion: metacontroller.k8s.io/v1alpha1
kind: DecoratorController
metadata:
  name: namespace-roles-operator
spec:
  resources:
  - apiVersion: v1
    resource: namespaces
  attachments:
  - apiVersion: rbac.authorization.k8s.io/v1
    resource: roles
  hooks:
    sync:
      webhook:
        url: http://namespace-operator-svc.default/sync
