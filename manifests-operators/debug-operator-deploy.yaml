apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debug-operator
  template:
    metadata:
      labels:
        app: debug-operator
        team: platform
    spec:
      containers:
      - name: operator
        image: debug-operator:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: debug-operator-svc
spec:
  selector:
    app: debug-operator
  ports:
  - port: 80
    targetPort: 8080
