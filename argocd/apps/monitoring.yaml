apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "65.1.0"
    helm:
      releaseName: monitoring
      values: |
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            resources:
              requests:
                cpu: 375m
                memory: 768Mi
              limits:
                cpu: 500m
                memory: 1Gi
            retention: 3d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        grafana:
          service:
            type: NodePort
            nodePort: 31300
          adminPassword: admin123
          grafana.ini:
            date_formats:
              default_timezone: UTC
          sidecar:
            datasources:
              defaultDatasourceEnabled: false
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 200m
              memory: 256Mi
        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 75m
                memory: 96Mi
              limits:
                cpu: 100m
                memory: 128Mi
        nodeExporter:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 15m
              memory: 48Mi
        prometheusOperator:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 15m
              memory: 48Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
