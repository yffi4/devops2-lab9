apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oauth-kustomize
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yffi4/devops2-lab9.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      name: oauth-api
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
